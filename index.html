<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarcoat Home — Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; padding: 24px; }
  .dash { max-width: 900px; margin: 0 auto; }
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(0,0,0,0.1); }
  .sc-circle { width: 36px; height: 36px; border-radius: 50%; background: #2D6A4F; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0; letter-spacing: 0.3px; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #1a1a18; }
  .topbar-sub { font-size: 11px; color: #666; margin-top: 1px; }
  .metrics { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; margin-bottom: 1.25rem; }
  .metric { background: #eeecea; border-radius: 8px; padding: 0.7rem 0.875rem; }
  .ml { font-size: 11px; color: #666; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
  .mv { font-size: 17px; font-weight: 600; color: #1a1a18; }
  .ms { font-size: 10px; color: #888; margin-top: 2px; }
  .controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .grp-label { font-size: 11px; color: #666; }
  .tgl { display: flex; border: 1px solid rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; }
  .tb { padding: 5px 13px; font-size: 12px; background: transparent; border: none; cursor: pointer; color: #666; transition: background .12s, color .12s; }
  .tb.on { background: #eeecea; color: #1a1a18; font-weight: 600; }
  .tb:hover:not(.on) { background: rgba(0,0,0,0.04); }
  .card { background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.875rem; }
  .ctitle { font-size: 12px; font-weight: 600; color: #1a1a18; margin-bottom: 10px; }
  .leg { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
  .li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
  .ld { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .yoy-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; }
  .yoy-card { background: #eeecea; border-radius: 8px; padding: 0.7rem 0.875rem; }
  .yoy-label { font-size: 11px; color: #666; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .yoy-curr { font-size: 17px; font-weight: 600; color: #1a1a18; margin-bottom: 2px; }
  .yoy-prev { font-size: 11px; color: #888; margin-bottom: 4px; }
  .yoy-chg { font-size: 12px; font-weight: 600; }
  .up { color: #3B6D11; }
  .down { color: #A32D2D; }
  .yoy-bar-track { height: 3px; background: rgba(0,0,0,0.1); border-radius: 2px; margin-top: 6px; }
  .yoy-bar-fill { height: 3px; border-radius: 2px; }
  @media (max-width: 600px) {
    .metrics, .yoy-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  }
</style>
</head>
<body>
<div class="dash">
  <div class="topbar">
    <div class="sc-circle">SC</div>
    <div style="flex:1">
      <div class="topbar-title">Sugarcoat Home — Sales Dashboard</div>
      <div class="topbar-sub">Instagram · Website · In-person · WWAG &nbsp;·&nbsp; Jan 2025 – Apr 2026</div>
    </div>
    <a href="/admin.html" style="font-size:11px;color:#666;text-decoration:none;padding:5px 10px;border:1px solid rgba(0,0,0,0.15);border-radius:6px;white-space:nowrap;">Update data</a>
  </div>

  <div class="metrics">
    <div class="metric"><p class="ml">Total sales</p><p class="mv" id="m-total">—</p><p class="ms" id="m-period">—</p></div>
    <div class="metric"><p class="ml"><span class="dot" style="background:#993556"></span>Instagram</p><p class="mv" id="m-ig">—</p><p class="ms" id="m-ig-pct">—</p></div>
    <div class="metric"><p class="ml"><span class="dot" style="background:#2D6A4F"></span>Website</p><p class="mv" id="m-web">—</p><p class="ms" id="m-web-pct">—</p></div>
    <div class="metric"><p class="ml"><span class="dot" style="background:#4A90C4"></span>In-person</p><p class="mv" id="m-ip">—</p><p class="ms" id="m-ip-pct">—</p></div>
    <div class="metric"><p class="ml"><span class="dot" style="background:#E07B39"></span>WWAG</p><p class="mv" id="m-ww">—</p><p class="ms" id="m-ww-pct">—</p></div>
  </div>

  <div class="card">
    <p class="ctitle" id="yoy-title">April 2026 vs April 2025</p>
    <div class="yoy-grid" id="yoy-grid"></div>
  </div>

  <div class="controls">
    <span class="grp-label">Range:</span>
    <div class="tgl">
      <button class="tb" id="btn-rall" onclick="setRange('all')">2025–2026</button>
      <button class="tb" id="btn-r2025" onclick="setRange('2025')">2025 only</button>
      <button class="tb on" id="btn-rytd" onclick="setRange('ytd')">2026 YTD</button>
    </div>
  </div>

  <div class="card">
    <p class="ctitle">Monthly sales by channel</p>
    <div class="leg" id="leg-mix"></div>
    <div style="position:relative;width:100%;height:320px;">
      <canvas id="mixChart"></canvas>
    </div>
  </div>
</div>

<script>
Chart.register(ChartDataLabels);
// BEGIN_DATA — updated by: node update.js
const ALL_MONTHS=["2025-01","2025-02","2025-03","2025-04","2025-05","2025-06","2025-07","2025-08","2025-09","2025-10","2025-11","2025-12","2026-01","2026-02","2026-03","2026-04"];
const dataIG  ={'2025-04':9074,'2025-05':9361,'2025-06':12318,'2025-07':14284,'2025-08':7838,'2025-09':9345,'2025-10':15274,'2025-11':14425,'2025-12':11593,'2026-01':24248,'2026-02':9758,'2026-03':11917,'2026-04':15121};
const dataWeb ={'2025-01':418,'2025-02':798,'2025-03':689,'2025-04':323,'2025-05':335,'2025-06':570,'2025-08':2230,'2025-09':2255,'2025-10':930,'2025-11':-262,'2025-12':454,'2026-01':752,'2026-02':765,'2026-03':1316,'2026-04':3099};
const dataIP  ={'2025-01':12199,'2025-02':3731,'2025-03':900,'2025-04':9241,'2025-05':6633,'2025-06':7210,'2025-07':1010,'2025-08':9801,'2025-09':125,'2025-10':1326,'2025-11':21670,'2025-12':897,'2026-01':2011,'2026-02':1384,'2026-03':5409,'2026-04':27909};
const wwag    ={'2025-01':2391,'2025-02':3735,'2025-03':1576,'2025-04':3569,'2025-05':1857,'2025-06':5528,'2025-07':2905,'2025-08':3618,'2025-09':3487,'2025-10':1206,'2025-11':3195,'2025-12':1475,'2026-01':4366,'2026-02':2877,'2026-03':3534,'2026-04':1659};
// END_DATA

function lbl(m){const[y,mo]=m.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+mo-1]+' '+y.slice(2);}
function monthName(m){const[y,mo]=m.split('-');return['January','February','March','April','May','June','July','August','September','October','November','December'][+mo-1]+' '+y;}

const C_IG='#993556',C_WEB='#2D6A4F',C_IP='#4A90C4',C_WW='#E07B39';

function ig(m){return dataIG[m]||0;}
function web(m){return dataWeb[m]||0;}
function ip(m){return dataIP[m]||0;}
function ww(m){return wwag[m]||0;}
function total(m){return ig(m)+web(m)+ip(m)+ww(m);}

let currentRange='ytd', mixChart=null;

function fmt(v){return v<0?'-$'+Math.round(Math.abs(v)).toLocaleString():'$'+Math.round(v).toLocaleString();}
function fmtChg(v){return(v>=0?'+':'')+fmt(v);}
function fmtPct(v){return(v>=0?'+':'')+Math.round(v)+'%';}
function pct(v,t){return t>0?Math.round(v/t*100)+'% of total':'—';}

function getMonths(){
  if(currentRange==='2025') return ALL_MONTHS.filter(m=>m.startsWith('2025'));
  if(currentRange==='ytd')  return ALL_MONTHS.filter(m=>m.startsWith('2026'));
  return ALL_MONTHS;
}

function latestMonth(){
  const m26=ALL_MONTHS.filter(m=>m.startsWith('2026'));
  return m26[m26.length-1];
}
function priorYearMonth(m){
  const[y,mo]=m.split('-'); return (parseInt(y)-1)+'-'+mo;
}

function updateMetrics(){
  const months=getMonths();
  let tig=0,tweb=0,tip=0,tww=0;
  months.forEach(m=>{tig+=ig(m);tweb+=web(m);tip+=ip(m);tww+=ww(m);});
  const tot=tig+tweb+tip+tww;
  document.getElementById('m-total').textContent=fmt(tot);
  document.getElementById('m-ig').textContent=fmt(tig);
  document.getElementById('m-web').textContent=fmt(tweb);
  document.getElementById('m-ip').textContent=fmt(tip);
  document.getElementById('m-ww').textContent=fmt(tww);
  document.getElementById('m-ig-pct').textContent=pct(tig,tot);
  document.getElementById('m-web-pct').textContent=pct(tweb,tot);
  document.getElementById('m-ip-pct').textContent=pct(tip,tot);
  document.getElementById('m-ww-pct').textContent=pct(tww,tot);
  document.getElementById('m-period').textContent={all:'Jan 2025 – Apr 2026','2025':'2025 full year',ytd:'2026 YTD'}[currentRange];
}

function updateYoY(){
  const curr=latestMonth();
  const prev=priorYearMonth(curr);
  document.getElementById('yoy-title').textContent=monthName(curr)+' vs '+monthName(prev);
  const channels=[
    {label:'Total',color:'#888780',currFn:total,prevFn:total},
    {label:'Instagram',color:C_IG,currFn:ig,prevFn:ig},
    {label:'Website',color:C_WEB,currFn:web,prevFn:web},
    {label:'In-person',color:C_IP,currFn:ip,prevFn:ip},
    {label:'WWAG',color:C_WW,currFn:ww,prevFn:ww}
  ];
  const maxCurr=Math.max(...channels.map(c=>c.currFn(curr)));
  document.getElementById('yoy-grid').innerHTML=channels.map(c=>{
    const cv=c.currFn(curr),pv=c.prevFn(prev);
    const chg=cv-pv;
    const pctChg=pv!==0?(chg/Math.abs(pv)*100):null;
    const isUp=chg>=0;
    const barW=maxCurr>0?Math.round(cv/maxCurr*100):0;
    const chgStr=pctChg!==null?fmtChg(chg)+' ('+fmtPct(pctChg)+')':fmtChg(chg);
    return `<div class="yoy-card">
      <p class="yoy-label"><span class="dot" style="background:${c.color}"></span>${c.label}</p>
      <p class="yoy-curr">${fmt(cv)}</p>
      <p class="yoy-prev">vs ${fmt(pv)}</p>
      <p class="yoy-chg ${isUp?'up':'down'}">${chgStr}</p>
      <div class="yoy-bar-track"><div class="yoy-bar-fill" style="width:${barW}%;background:${c.color}"></div></div>
    </div>`;
  }).join('');
}

function buildLegend(id,items){document.getElementById(id).innerHTML=items.map(i=>`<span class="li"><span class="ld" style="background:${i.c}"></span>${i.label}</span>`).join('');}

function renderMix(){
  const months=getMonths(),labels=months.map(lbl);
  buildLegend('leg-mix',[{c:C_IG,label:'Instagram'},{c:C_WEB,label:'Website'},{c:C_IP,label:'In-person'},{c:C_WW,label:'WWAG'}]);
  if(mixChart) mixChart.destroy();
  const igD=months.map(m=>Math.round(ig(m)));
  const webD=months.map(m=>Math.round(web(m)));
  const ipD=months.map(m=>Math.round(ip(m)));
  const wwD=months.map(m=>Math.round(ww(m)));
  const totD=months.map((_,i)=>igD[i]+webD[i]+ipD[i]+wwD[i]);
  mixChart=new Chart(document.getElementById('mixChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Instagram',data:igD,backgroundColor:C_IG,stack:'s',datalabels:{display:false}},
      {label:'Website',data:webD,backgroundColor:C_WEB,stack:'s',datalabels:{display:false}},
      {label:'In-person',data:ipD,backgroundColor:C_IP,stack:'s',datalabels:{display:false}},
      {label:'WWAG',data:wwD,backgroundColor:C_WW,stack:'s',datalabels:{
        display:true,anchor:'end',align:'end',offset:2,
        formatter:(_,ctx)=>fmt(totD[ctx.dataIndex]),
        font:{size:9,weight:'600'},color:'#1a1a18'
      }},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:22}},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          label:ctx=>' '+ctx.dataset.label+': '+fmt(ctx.parsed.y),
          footer:items=>' Total: '+fmt(items.reduce((a,i)=>a+i.parsed.y,0))
        },footerFont:{weight:'600'}}
      },
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{font:{size:11},maxRotation:45,autoSkip:false}},
        y:{stacked:true,grid:{color:'rgba(0,0,0,0.06)'},ticks:{font:{size:11},callback:v=>fmt(v)}}
      }
    }
  });
}

function setRange(r){
  currentRange=r;
  document.getElementById('btn-rall').classList.toggle('on',r==='all');
  document.getElementById('btn-r2025').classList.toggle('on',r==='2025');
  document.getElementById('btn-rytd').classList.toggle('on',r==='ytd');
  updateMetrics();renderMix();
}

updateMetrics();updateYoY();renderMix();
</script>
</body>
</html>
